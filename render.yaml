# ─────────────────────────────────────────────────────────────────────────────
# Render.com Blueprint — FinanceApp Diploma
#
# Сервіси:
#   diploma-backend  — Django + Gunicorn (Web Service, Docker)
#   diploma-celery   — Celery worker (Worker Service, той самий Docker image)
#   diploma-frontend — React/Vite (Static Site, без контейнера)
#   diploma-redis    — Redis (Render managed, free tier)
#
# Перед деплоєм встановіть у Render Dashboard (sync: false) такі змінні:
#   MONGODB_URI            — рядок підключення MongoDB Atlas
#   GOOGLE_CREDENTIALS_B64 — base64 від JSON сервісного акаунта Google
#     Отримати: base64 -i backend/diploma-*.json | tr -d '\n'
#   CORS_ALLOWED_ORIGINS   — URL вашого фронтенду (напр. https://diploma-frontend.onrender.com)
#   VITE_API_BASE_URL      — URL бекенду (напр. https://diploma-backend.onrender.com)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend (Django + Gunicorn) ────────────────────────────────────────────
  - type: web
    name: diploma-backend
    env: docker
    # dockerContext навмисно не вказано — контекст = корінь репо.
    # Dockerfile сам копіює тільки папку backend/ через "COPY backend/ ."
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: ".onrender.com"

      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: diploma_db

      - key: REDIS_URL
        fromService:
          type: redis
          name: diploma-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: diploma-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: diploma-redis
          property: connectionString

      - key: GOOGLE_CREDENTIALS_B64
        sync: false

      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # ── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: diploma-celery
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    dockerCommand: celery -A config worker --loglevel=info --concurrency=1
    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: diploma-backend
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: diploma_db
      - key: REDIS_URL
        fromService:
          type: redis
          name: diploma-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: diploma-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: diploma-redis
          property: connectionString
      - key: GOOGLE_CREDENTIALS_B64
        sync: false

  # ── Frontend (React/Vite — Static Site) ───────────────────────────────────
  - type: web
    name: diploma-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

# ── Redis (Managed) ───────────────────────────────────────────────────────────
databases:
  - name: diploma-redis
    plan: free
